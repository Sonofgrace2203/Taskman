<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskman</title>
    <script>
        if (window.location.hostname === "sonofgrace2203.github.io") {
            document.write('<base href="/Taskman/">');
        } else {
            document.write('<base href="/">');
        }
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Taskman.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="position: fixed; inset: 0;">
            <div class="loading-progress"
                style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100vh; gap:20px;">

                <img src="favicon.png" alt="TaskMan Logo" width="120"
                    style=".slide-from-top {animation: slideFromTop 0.8s cubic-bezier(.175, .885, .32, 1.275) forwards;}
                @keyframes slideFromTop { 0% {transform: translateY(-120px); opacity: 0;} 70% {transform: translateY(10px); opacity: 1;} 100% {transform: translateY(0);opacity: 1;}}" />

                <svg width="220" height="6" viewBox="0 0 220 6">
                    <!-- Background -->
                    <rect x="0" y="0" width="220" height="6" rx="3" fill="#E9D5FF" />

                    <!-- Animated Progress -->
                    <rect class="loading-progress-text" x="0" y="0" width="60" height="6" rx="3" fill="#F97316">
                        <animate attributeName="x" from="-60" to="220" dur="1.2s" repeatCount="indefinite" />
                    </rect>
                </svg>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
