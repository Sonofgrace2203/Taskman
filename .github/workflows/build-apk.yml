name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to manually trigger it

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor
        run: dotnet publish -c Release -o release-output

      - name: Setup Node & Java
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Capacitor Android Build
        run: |
          npm install -g @capacitor/cli
          npx cap init "BlazorApp" "com.example.app" --web-dir=release-output/wwwroot
          npm install @capacitor/core @capacitor/android
          npx cap add android
          npx cap sync
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      # This new step forces GitHub to find exactly where the APK was stored
      - name: Locate and copy APK
        run: |
          mkdir -p final-apk
          find android/ -name "*.apk" -exec cp {} final-apk/ \;
          ls -R final-apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Blazor-Android-APK
          path: final-apk/
          if-no-files-found: error # This will force a RED X if the APK is truly missing
          
